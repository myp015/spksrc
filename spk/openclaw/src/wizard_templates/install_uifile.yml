CONFIGURATION_TITLE: "OpenClaw 安装参数"

WORKSPACE_DIR_DESCRIPTION: "OpenClaw 工作目录（默认 /volume1/docker/openclaw，将同步到 openclaw.json 的 agents.defaults.workspace 与 memory.qmd.paths[0].path）"
WORKSPACE_DIR_LABEL: "工作目录"

MODEL_ID_DESCRIPTION: "默认模型 ID（同步到 models.providers.default.models[0].id/name 与 agents.defaults.model.primary/imageModel.primary）"
MODEL_ID_LABEL: "MODEL_ID"

BASE_URL_DESCRIPTION: "模型接口 BASE_URL（同步到 models.providers.default.baseUrl）"
BASE_URL_LABEL: "BASE_URL"

API_KEY_DESCRIPTION: "模型接口 API_KEY（同步到 models.providers.default.apiKey）"
API_KEY_LABEL: "API_KEY"

FEISHU_APP_ID_DESCRIPTION: "飞书应用 App ID（留空则不启用 feishu 插件）"
FEISHU_APP_ID_LABEL: "FEISHU_APP_ID"

FEISHU_APP_SECRET_DESCRIPTION: "飞书应用 App Secret（留空则不启用 feishu 插件）"
FEISHU_APP_SECRET_LABEL: "FEISHU_APP_SECRET"

DINGTALK_CLIENT_ID_DESCRIPTION: "钉钉 Client ID（留空则不启用 dingtalk 插件）"
DINGTALK_CLIENT_ID_LABEL: "DINGTALK_CLIENT_ID"

DINGTALK_CLIENT_SECRET_DESCRIPTION: "钉钉 Client Secret（留空则不启用 dingtalk 插件）"
DINGTALK_CLIENT_SECRET_LABEL: "DINGTALK_CLIENT_SECRET"

QQBOT_APP_ID_DESCRIPTION: "QQBot App ID（留空则不启用 openclaw-qqbot 插件）"
QQBOT_APP_ID_LABEL: "QQBOT_APP_ID"

QQBOT_CLIENT_SECRET_DESCRIPTION: "QQBot Client Secret（留空则不启用 openclaw-qqbot 插件）"
QQBOT_CLIENT_SECRET_LABEL: "QQBOT_CLIENT_SECRET"

WECOM_BOT_ID_DESCRIPTION: "企业微信 Bot ID（留空则不启用 wecom 插件）"
WECOM_BOT_ID_LABEL: "WECOM_BOT_ID"

WECOM_SECRET_DESCRIPTION: "企业微信 Secret（留空则不启用 wecom 插件）"
WECOM_SECRET_LABEL: "WECOM_SECRET"

INSTALLATION_NOTES_TITLE: "<b>说明</b><br/>"
INSTALLATION_NOTES_TEXT1: "首次安装时填写上述参数；安装器会将值写入 /volume1/docker/openclaw/openclaw.json（若检测到旧版 /var/packages/openclaw/var/openclaw.json 会自动迁移）。"
