name: Build & Commit OpenClaw SPK (x64 7.2)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (branch/tag/SHA)'
        required: false
        default: 'main'
      commit_result:
        description: 'Commit built .spk to this repository'
        required: false
        default: true
        type: boolean

jobs:
  build-openclaw:
    name: Build openclaw (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x64-7.2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || 'main' }}
          fetch-depth: 0

      - name: Cache toolchains
        uses: actions/cache@v5
        with:
          path: toolchain/*/work
          key: toolchain-${{ matrix.arch }}-openclaw-v1-${{ hashFiles(format('toolchain/syno-{0}/digests',matrix.arch)) }}

      - name: Build openclaw package
        uses: docker://ghcr.io/synocommunity/spksrc:latest
        with:
          entrypoint: /bin/bash
          args: -lc "set -e; cd /github/workspace/spk/openclaw && make arch-${{ matrix.arch }}"

      - name: Upload SPK artifact
        uses: actions/upload-artifact@v6
        with:
          name: openclaw-${{ matrix.arch }}
          path: packages/openclaw_${{ matrix.arch }}_*.spk
          if-no-files-found: error

      - name: Commit built SPK to repository
        if: github.event.inputs.commit_result == 'true'
        shell: bash
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p releases/openclaw
          cp -f packages/openclaw_${{ matrix.arch }}_*.spk releases/openclaw/
          git add releases/openclaw/*.spk
          if git diff --cached --quiet; then
            echo "No new SPK changes to commit"
            exit 0
          fi
          git commit -m "ci: add openclaw ${{ matrix.arch }} SPK artifact"
          git push
