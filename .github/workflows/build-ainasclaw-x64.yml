name: Build AiNasClaw SPK (x64-7.2)

on:
  push:
    branches:
      - master
    paths:
      - 'spk/ainasclaw/**'
      - '.github/workflows/build-ainasclaw-x64.yml'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (branch/tag/SHA)'
        required: false
        default: 'master'

jobs:
  build-ainasclaw-x64:
    name: Build ainasclaw (x64-7.2)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || 'master' }}
          fetch-depth: 0

      - name: Prepare signing key
        run: |
          mkdir -p .openclaw/keys/ainasclaw
          if [ -z "${{ secrets.AINASCLAW_SPK_SIGN_KEY }}" ]; then
            echo "AINASCLAW_SPK_SIGN_KEY secret is empty or missing" >&2
            exit 1
          fi
          printf '%s\n' "${{ secrets.AINASCLAW_SPK_SIGN_KEY }}" > .openclaw/keys/ainasclaw/spk-signing-private.pem
          chmod 600 .openclaw/keys/ainasclaw/spk-signing-private.pem

      - name: Cache toolchains
        uses: actions/cache@v4
        with:
          path: toolchain/*/work
          key: toolchain-x64-7.2-ainasclaw-v1-${{ hashFiles('toolchain/syno-x64-7.2/digests') }}

      - name: Build ainasclaw package
        uses: docker://ghcr.io/synocommunity/spksrc:latest
        with:
          entrypoint: /bin/bash
          args: -lc "set -e; cd /github/workspace/spk/ainasclaw && SPK_SIGN_KEY_PATH=/github/workspace/.openclaw/keys/ainasclaw/spk-signing-private.pem make arch-x64-7.2"

      - name: Upload SPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ainasclaw-x64-7.2
          path: packages/ainasclaw_x64-7.2_*.spk
          if-no-files-found: error
