name: Build OpenClaw SPK (aarch64-7.2)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (branch/tag/SHA)'
        required: false
        default: 'master'

jobs:
  build-openclaw-aarch64:
    name: Build openclaw (aarch64-7.2)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || 'master' }}
          fetch-depth: 0

      - name: Cache toolchains
        uses: actions/cache@v5
        with:
          path: toolchain/*/work
          key: toolchain-aarch64-7.2-openclaw-v1-${{ hashFiles('toolchain/syno-aarch64-7.2/digests') }}

      - name: Build openclaw package
        uses: docker://ghcr.io/synocommunity/spksrc:latest
        with:
          entrypoint: /bin/bash
          args: -lc "set -e; cd /github/workspace/spk/openclaw && make arch-aarch64-7.2"

      - name: Commit built SPK to repository (Git LFS)
        shell: bash
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git lfs install
          git lfs track "releases/**/*.spk"
          mkdir -p releases/openclaw
          cp -f packages/openclaw_aarch64-7.2_*.spk releases/openclaw/
          git add .gitattributes
          git add releases/openclaw/*.spk
          if git diff --cached --quiet; then
            echo "No new SPK changes to commit"
            exit 0
          fi
          git commit -m "ci: add openclaw aarch64-7.2 SPK artifact"
          git push
